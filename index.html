<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020617" />

    <!-- SEO & Branding -->
    <title>DataPolish | Free PDF, HTML, Excel & AI Prompt Text Utility</title>
    <meta
      name="title"
      content="DataPolish | Free PDF, HTML, Excel & AI Prompt Text Utility"
    />
    <meta
      name="description"
      content="Fix broken PDF copy-paste, strip HTML tags, convert Excel rows to Markdown tables, and optimize AI prompts. 100% private, browser-based, no signup."
    />
    <meta
      name="keywords"
      content="PDF text fixer, HTML stripper, Excel to markdown, AI prompt optimizer, text utility, online text tool, GDPR private text tool"
    />
    <meta name="author" content="Tomas" />

    <!-- Canonical URL (kanonicka verzia bez www) -->
    <link rel="canonical" href="https://datapolish.org/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://datapolish.org/" />
    <meta property="og:title" content="DataPolish — Refine Your Data" />
    <meta
      property="og:description"
      content="Fast, private, browser-based text utility. Fix PDFs, strip HTML, convert Excel to Markdown, optimize AI prompts."
    />
    <meta property="og:image" content="https://datapolish.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="DataPolish — Refine Your Data. Fast, private, browser-based text utility."
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="DataPolish" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://datapolish.org/" />
    <meta name="twitter:title" content="DataPolish — Refine Your Data" />
    <meta
      name="twitter:description"
      content="Fast, private, browser-based text utility. Fix PDFs, strip HTML, convert Excel to Markdown, optimize AI prompts."
    />
    <meta name="twitter:image" content="https://datapolish.org/og-image.png" />

    <!-- JSON-LD Structured Data (WebApplication) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "DataPolish",
        "url": "https://datapolish.org/",
        "description": "Browser-based utility to fix PDF copy-paste layout, strip HTML tags, convert Excel rows to Markdown tables, and optimize AI prompts. All processing runs locally in your browser.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Any (web browser)",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Fix broken PDF text layouts",
          "Strip HTML tags from text",
          "Convert Excel/TSV to Markdown tables",
          "Optimize AI prompts by removing token waste"
        ],
        "browserRequirements": "Requires JavaScript. Works in any modern browser.",
        "permissions": "No data leaves the browser. No tracking, no cookies.",
        "author": {
          "@type": "Person",
          "name": "Tomas",
          "url": "https://github.com/tosko21-ux"
        },
        "license": "https://opensource.org/licenses/MIT"
      }
    </script>

    <!-- Favicon & Styles -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Refine Your Data.</h1>
        <p class="subtitle">
          Fast, private, and powerful. Transform messy data into clean assets in
          seconds.
        </p>
      </header>

      <main class="card">
        <div class="label-row">
          <label for="mainInput">Input Raw Data</label>
          <span id="charCount">0 characters</span>
        </div>

        <textarea
          id="mainInput"
          placeholder="Paste messy text, HTML, or Excel rows here..."
          spellcheck="false"
        ></textarea>

        <div class="button-grid">
          <button class="btn-tool" data-action="pdf">Fix PDF Layout</button>
          <button class="btn-tool" data-action="html">Strip HTML Tags</button>
          <button class="btn-tool" data-action="markdown">Excel to MD</button>
          <button class="btn-tool" data-action="ai">Optimize AI Prompt</button>
        </div>

        <div id="outputContainer" class="hidden">
          <div class="result-header">
            <label>Refined Result</label>
            <button id="copyBtn" class="btn-copy">Copy to Clipboard</button>
          </div>
          <div id="mainOutput" class="output-area"></div>
        </div>
      </main>

      <footer>
        <p>100% Client-side. Your data never leaves this browser.</p>
        <div class="status-bar">
          <span class="dot"></span> Global Service Status: Online
          <span class="separator">|</span>
          <a
            href="https://bikegeardecoder.com"
            target="_blank"
            rel="noopener noreferrer"
            class="affiliate-link"
            >Try also: BikeGearDecoder</a
          >
        </div>
        <div class="footer-links">
          <a href="/about">About</a>
          <span class="separator">·</span>
          <a href="/privacy">Privacy</a>
          <span class="separator">·</span>
          <a
            href="https://github.com/tosko21-ux/datapolish"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
        </div>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
