server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Skry verziu nginx v Server headeri
    server_tokens off;

    # Security headers (aplikuju sa na vsetko, vratane error stranok)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # Gzip kompresia
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Clean URLs: /about -> /about.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom 404
    error_page  404  /404.html;
    location = /404.html {
        internal;
    }

    # HTML: nikdy necachovat (vzdy stiahnut cerstve)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # JS, CSS, JSON: 1h cache, vzdy revalidovat
    location ~* \.(css|js|json)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # Obrazky a fonty: dlha cache (menia sa zriedka)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public" always;
    }

    # Blokuj pristup k skrytym suborom (.git, .env, .htaccess, atd.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
