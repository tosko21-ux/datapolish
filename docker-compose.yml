services:
  datapolish:
    image: nginx:1.27-alpine
    container_name: datapolish
    restart: unless-stopped
    volumes:
      - /var/www/datapolish:/usr/share/nginx/html:ro
      - /var/www/datapolish/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx_network
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nginx_network:
    external: true
